{% extends "base.html" %}

{% block title %}Edit User - SkillSync Nexus{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="glass-card p-8">
        <h1 class="text-2xl font-bold mb-6">Edit User: {{ user.username }}</h1>
        
        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">First Name</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" class="input-field w-full px-4 py-3 rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Last Name</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" class="input-field w-full px-4 py-3 rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" name="email" value="{{ user.email }}" class="input-field w-full px-4 py-3 rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" name="username" value="{{ user.username }}" class="input-field w-full px-4 py-3 rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Credits</label>
                    <input type="number" name="credits" value="{{ user.credits }}" class="input-field w-full px-4 py-3 rounded-xl" required>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" name="is_active" id="is_active" {% if user.is_active %}checked{% endif %} class="w-4 h-4 rounded">
                    <label for="is_active" class="ml-2">Active</label>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" name="is_admin" id="is_admin" {% if user.is_admin %}checked{% endif %} class="w-4 h-4 rounded">
                    <label for="is_admin" class="ml-2">Admin</label>
                </div>
            </div>
            
            <div class="flex space-x-4 mt-6">
                <a href="{{ url_for('admin.users') }}" class="flex-1 glass px-4 py-3 rounded-xl text-center hover:bg-white/10">
                    Cancel
                </a>
                <button type="submit" class="flex-1 btn-gradient px-4 py-3 rounded-xl font-semibold">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
