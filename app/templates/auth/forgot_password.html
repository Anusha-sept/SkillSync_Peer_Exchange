{% extends "base.html" %}

{% block title %}Forgot Password - SkillSync Nexus{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="{{ url_for('main.index') }}" class="inline-flex items-center space-x-2">
                <i class="fas fa-sync-alt text-4xl gradient-text"></i>
                <span class="font-bold text-3xl gradient-text">SkillSync Nexus</span>
            </a>
            <h2 class="mt-6 text-3xl font-bold">Reset Password</h2>
            <p class="mt-2 text-gray-400">Enter your email to receive reset instructions</p>
        </div>
        
        <div class="glass-card p-8">
            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input type="email" name="email" required class="input-field w-full px-4 py-3 rounded-xl focus:outline-none" placeholder="you@example.com">
                    </div>
                    
                    <button type="submit" class="btn-gradient w-full py-3 px-4 rounded-xl font-semibold text-white">
                        <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-400">Remember your password? <a href="{{ url_for('auth.login') }}" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</a></p>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <a href="{{ url_for('main.index') }}" class="text-gray-400 hover:text-white">
                <i class="fas fa-arrow-left mr-2"></i>Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
