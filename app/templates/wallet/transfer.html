{% extends "base.html" %}

{% block title %}Transfer Credits - SkillSync Nexus{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="glass-card p-8">
        <h1 class="text-2xl font-bold mb-6 text-center">Transfer Credits</h1>
        
        <div class="bg-indigo-500/20 p-4 rounded-xl border border-indigo-500/30 mb-6">
            <div class="flex items-center justify-between">
                <span class="text-gray-300">Your balance:</span>
                <span class="font-bold text-xl">{{ current_user.credits }} credits</span>
            </div>
        </div>
        
        <form method="POST">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Recipient Username</label>
                <input type="text" name="username" class="input-field w-full px-4 py-3 rounded-xl" placeholder="Enter username" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Amount</label>
                <input type="number" name="amount" class="input-field w-full px-4 py-3 rounded-xl" placeholder="Enter amount" min="1" required>
            </div>
            
            <button type="submit" class="btn-gradient w-full py-3 px-4 rounded-xl font-semibold">
                <i class="fas fa-paper-plane mr-2"></i>Transfer
            </button>
        </form>
    </div>
</div>
{% endblock %}
