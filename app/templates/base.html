<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SkillSync Nexus{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
        }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-link {
            padding: 8px 12px;
            border-radius: 10px;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg,#6366f1,#ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- =====================================================
NAVBAR
===================================================== -->
{% if current_user.is_authenticated %}

<nav class="glass flex justify-between items-center px-6 py-4">

    <!-- LOGO -->
    <a href="{{ url_for('main.dashboard') }}" class="text-xl font-bold gradient-text">
        SkillSync Nexus
    </a>

    <!-- LINKS -->
    <div class="flex gap-2">

        <a class="nav-link" href="{{ url_for('main.dashboard') }}">Dashboard</a>

        <a class="nav-link" href="{{ url_for('main.matches') }}">Matches</a>

        <!-- FIXED: sessions route exists now -->
        <a class="nav-link" href="{{ url_for('sessions.my_sessions') }}">Sessions</a>

        <a class="nav-link" href="{{ url_for('main.explore') }}">Explore</a>

    </div>

    <!-- USER -->
    <div class="flex items-center gap-3">

        <span class="text-sm">
            {{ current_user.first_name }}
        </span>

        <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}"
             class="w-9 h-9 rounded-full">

        <a href="{{ url_for('auth.logout') }}"
           class="text-gray-400 hover:text-white text-sm px-3 py-1 rounded-lg hover:bg-white/10 transition-all">
            Logout
        </a>

    </div>

</nav>

{% endif %}

<!-- =====================================================
PAGE CONTENT
===================================================== -->
<main class="p-4">
    {% block content %}{% endblock %}
</main>

<!-- =====================================================
FLASH ALERTS
===================================================== -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    const toasts = document.querySelectorAll(".toast");
    toasts.forEach(t => {
        setTimeout(() => t.remove(), 4000);
    });
});

function showAlert(type, title, msg) {
    Swal.fire({ icon: type, title: title, text: msg });
}
</script>

{% block extra_js %}{% endblock %}

</body>
</html>
